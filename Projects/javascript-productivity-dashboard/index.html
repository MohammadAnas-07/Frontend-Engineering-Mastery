<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="heading">JavaScript Productivity Dashboard</h1>

        <form id="taskForm">
            <input type="text"
            id="taskInput"
            placeholder="Enter a Task">

            <button id="addBtn">Add Task</button>
        </form>

        <ul id="taskList"></ul>
    </div>
    <script src="./js/app.js"></script>
</body>
</html>
